name: Check LINE Docs

on:
  schedule:
    # Every Monday 00:00 UTC (Mon 08:00 Asia/Taipei)
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: check-line-docs
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet requests beautifulsoup4

      - name: Check docs against baseline
        id: check
        run: python scripts/check_line_docs.py

      - name: Commit initial baseline
        if: steps.check.outputs.is_first_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .line-docs-baseline.json
          git commit -m "chore: initialize LINE docs baseline"
          git push

      - name: Build PR body
        if: steps.check.outputs.has_changes == 'true'
        id: body
        run: |
          {
            echo 'content<<PR_BODY_EOF'
            cat /tmp/line-docs-changes.md
            echo
            echo '---'
            echo
            echo 'Opened automatically by `.github/workflows/check-line-docs.yml`.'
            echo
            echo 'Review the changed pages against `skills/*/SKILL.md` and `skills/*/references/*.md`. Update skill content as needed, then merge. The baseline hash updates are the only code change included here.'
            echo 'PR_BODY_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Open PR
        if: steps.check.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: LINE docs baseline refresh (${{ steps.check.outputs.changed_count }} changed)"
          title: "chore: LINE docs changed — ${{ steps.check.outputs.changed_count }} page(s)"
          body: ${{ steps.body.outputs.content }}
          branch: automation/line-docs-update
          delete-branch: true
          add-paths: |
            .line-docs-baseline.json
          labels: |
            docs
            automation
